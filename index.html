<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <div class="card">
      <img
        src="assets/images/illustration-article.svg"
        alt="illustration"
        class="illustration-img"
      />
      <span class="tag">Learning</span>
      <p class="date">Published <time datetime="21-12-2023">21 Dec 2023</time></p>
      <h1 class="title">HTML & CSS foundations</h1>
      <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      <div class="author">
        <img src="assets/images/image-avatar.webp" alt="Author Greg Hooper avatar"
        class="avatar-img">
        <span class="author-name">Greg Hooper</span>
      </div>
    </div>
  </body>
</html>
